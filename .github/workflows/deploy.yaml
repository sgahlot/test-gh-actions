name: Deploy to OpenShift

on:
  workflow_run:
    # Workflows this workflow depends on  
    workflows: ["Build and push image"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Target namespace for deployment'
        required: false
        default: 'sgahlot-test'
        type: string
      force_deploy:
        description: 'Force deployment even if build workflow did not run'
        required: false
        default: false
        type: boolean

env:
  NAMESPACE: ${{ github.event.inputs.namespace || 'sgahlot-test' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Run this workflow ONLY after the workflows defined in workflow_run section complete successfully
    # OR if manually triggered with force_deploy=true
    if: ${{ github.event.workflow_run.conclusion == 'success' || (github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: 4

      - name: Login to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true # Set to false if we have a valid certificate

      - name: Deploy metrics-summarizer with Makefile
        env:
          HF_TOKEN: ${{ secrets.HUGGINGFACE_API_KEY }}
          NAMESPACE: ${{ env.NAMESPACE }}
        run: |
          # Run make target from root dir
          make install
